services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: goldlink-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: goldlink
      POSTGRES_PASSWORD: goldlink_password
      POSTGRES_DB: goldlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldlink -d goldlink"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - goldlink-dev-network

  # ─── Migrator (schema push + seed, exits when done) ─────
  migrator:
    build:
      context: .
      target: migrator
    container_name: goldlink-migrator-dev
    env_file: .env.docker.dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - uploads_dev:/app/public/uploads
    networks:
      - goldlink-dev-network

  # ─── Next.js App (hot reload) ────────────────────────────
  app:
    build:
      context: .
      target: dev
    container_name: goldlink-app-dev
    restart: unless-stopped
    env_file: .env.docker.dev
    depends_on:
      migrator:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - .:/app                       # source code → hot reload
      - /app/node_modules            # keep container node_modules
      - /app/.next                   # keep build cache
      - uploads_dev:/app/public/uploads
    environment:
      - WATCHPACK_POLLING=true       # file watching fiable sur macOS/Windows
    networks:
      - goldlink-dev-network

  # ─── Adminer (DB GUI) ────────────────────────────────────
  adminer:
    image: adminer:4-standalone
    container_name: goldlink-adminer-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - goldlink-dev-network

volumes:
  postgres_dev_data:
  uploads_dev:

networks:
  goldlink-dev-network:
    driver: bridge

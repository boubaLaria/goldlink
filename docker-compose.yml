
services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: goldlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goldlink
      POSTGRES_PASSWORD: goldlink_password
      POSTGRES_DB: goldlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldlink -d goldlink"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - goldlink-network

  # ─── Migrator (schema push + seed, exits when done) ─────
  migrator:
    build:
      context: .
      target: migrator
    container_name: goldlink-migrator
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - goldlink-network

  # ─── Next.js App ─────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
    container_name: goldlink-app
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      migrator:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - goldlink-network

  # ─── Adminer (DB GUI) ────────────────────────────────────
  adminer:
    image: adminer:4-standalone
    container_name: goldlink-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - goldlink-network

  # ─── Ollama — utilise l'instance locale du Mac ───────
  # ollama est installé nativement sur le Mac (brew)
  # Lancer avant docker compose : ollama serve
  # Puller le modèle une fois : ollama pull llava-llama3:8b

  # ─── Diffusers Try-On — microservice natif sur le Mac ─
  # Lancer manuellement : python services/diffusers-tryon/server.py
  # Tourne sur host.docker.internal:8189

  # ─── Image Validator (Python microservice) ───────────
  image-validator:
    build:
      context: ./services/image-validator
      dockerfile: Dockerfile
    container_name: goldlink-image-validator
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
    networks:
      - goldlink-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  uploads:

networks:
  goldlink-network:
    driver: bridge
